name: Build and Release Grayjay APK
on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"
permissions:
  contents: write
concurrency:
  group: grayjay-build
  cancel-in-progress: false
env:
  UPSTREAM_REPO: https://gitlab.futo.org/videostreaming/grayjay.git
  UPSTREAM_BRANCH: master
jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
      - name: Resolve latest upstream SHA
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          sha="$(git ls-remote "$UPSTREAM_REPO" "refs/heads/$UPSTREAM_BRANCH" | awk '{print $1}')"
          [ -n "$sha" ] || { echo "Failed to resolve upstream SHA" >&2; exit 1; }
          echo "upstream_sha=$sha" >> "$GITHUB_OUTPUT"
      - name: Read last built SHA
        id: state
        shell: bash
        run: |
          set -euo pipefail
          if [ -f .github/grayjay-last-built-sha.txt ]; then
            last_sha="$(tr -d '\n' < .github/grayjay-last-built-sha.txt)"
          else
            last_sha=""
          fi
          echo "last_sha=$last_sha" >> "$GITHUB_OUTPUT"
      - name: Decide whether to build
        id: check
        shell: bash
        run: |
          set -euo pipefail
          upstream_sha="${{ steps.upstream.outputs.upstream_sha }}"
          last_sha="${{ steps.state.outputs.last_sha }}"
          short_sha="${upstream_sha:0:12}"

          echo "upstream_sha=$upstream_sha" >> "$GITHUB_OUTPUT"
          echo "release_tag=grayjay-debug-${short_sha}" >> "$GITHUB_OUTPUT"

          if [ "$upstream_sha" != "$last_sha" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi
  build-debug-release:
    needs: check-upstream
    if: needs.check-upstream.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install required host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y git git-lfs curl patch unzip
      - name: Install Android build-tools
        shell: bash
        run: |
          set -euo pipefail
          (yes || true) | sdkmanager "build-tools;35.0.0"
      - name: Clone upstream Grayjay
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$UPSTREAM_BRANCH" "$UPSTREAM_REPO" grayjay
          cd grayjay
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git submodule update --init --recursive
          git lfs install --local
          git lfs pull
          git submodule foreach --recursive 'git lfs install --local || true; git lfs pull || true'
          git rev-parse HEAD > ../UPSTREAM_SHA.txt
      - name: Download patches
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p patches

          curl -fL \
            "https://github.com/futo-org/grayjay-android/pull/2637.patch" \
            -o patches/001-sort-playlist-videos.patch

          curl -fL \
            "https://github.com/futo-org/grayjay-android/pull/3252.patch" \
            -o patches/002-hide-comments-ratings-chat.patch

          curl -fL \
            "https://github.com/user-attachments/files/26777816/finite-scroll.patch" \
            -o patches/003-disable-infinite-scroll.patch
      - name: Apply patches
        shell: bash
        run: |
          set -euo pipefail
          cd grayjay

          for p in ../patches/*.patch; do
            echo "Applying $p"
            git apply --3way --check "$p"
            git apply --3way "$p"
            git add -A
            git commit -m "Apply $(basename "$p")"
          done
      - name: Decode stable debug keystore
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] || { echo "Missing ANDROID_KEYSTORE_BASE64 secret" >&2; exit 1; }
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > signing-keystore.jks
      - name: Make gradlew executable
        shell: bash
        run: |
          set -euo pipefail
          chmod +x grayjay/gradlew
      - name: Configure Gradle memory for CI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.gradle"
          cat > "$HOME/.gradle/gradle.properties" <<'EOF'
          org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
          org.gradle.daemon=false
          org.gradle.parallel=true
          org.gradle.workers.max=2
          kotlin.daemon.jvmargs=-Xmx3g
          EOF
      - name: Create init script to force stable signing onto debug builds
        shell: bash
        run: |
          set -euo pipefail
          cat > "${{ github.workspace }}/force-debug-signing.init.gradle" <<'EOF'
          allprojects {
            afterEvaluate { project ->
              def android = project.extensions.findByName("android")
              if (android == null) return

              def debugSigning = android.signingConfigs.findByName("debug")
              if (debugSigning != null) {
                debugSigning.storeFile = file(System.getenv("ANDROID_KEYSTORE_FILE"))
                debugSigning.storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
                debugSigning.keyAlias = System.getenv("ANDROID_KEY_ALIAS")
                debugSigning.keyPassword = System.getenv("ANDROID_KEY_PASSWORD")
              }

              def debugType = android.buildTypes.findByName("debug")
              if (debugType != null && debugSigning != null) {
                debugType.signingConfig = debugSigning
              }
            }
          }
          EOF
      - name: Build signed debug APK
        shell: bash
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/signing-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          cd grayjay

          if ./gradlew --no-daemon \
            -I "${{ github.workspace }}/force-debug-signing.init.gradle" \
            assembleDebug; then
            exit 0
          fi

          echo "assembleDebug failed; trying :app:assembleDebug" >&2
          ./gradlew --no-daemon \
            -I "${{ github.workspace }}/force-debug-signing.init.gradle" \
            :app:assembleDebug
      - name: Collect all built APKs
        shell: bash
        run: |
          set -euo pipefail
          sha="$(cat UPSTREAM_SHA.txt)"
          short="${sha:0:12}"
          mkdir -p dist

          mapfile -t apks < <(find grayjay -type f \
            \( -path '*/build/outputs/apk/debug/*.apk' -o -path '*/build/outputs/apk/*debug*.apk' \) \
            | sort)

          [ "${#apks[@]}" -gt 0 ] || { echo "No debug APKs found" >&2; exit 1; }

          for apk in "${apks[@]}"; do
            base="$(basename "$apk")"
            cp "$apk" "dist/${short}-${base}"
          done

          echo "Collected APKs:"
          ls -lh dist
      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          sha="$(cat UPSTREAM_SHA.txt)"

          cat > RELEASE_NOTES.md <<EOF
          Automated Grayjay debug build from upstream commit:

          - Upstream repo: ${UPSTREAM_REPO}
          - Upstream branch: ${UPSTREAM_BRANCH}
          - Upstream commit: \`${sha}\`

          This is a debug/development build, signed with a stable custom keystore for upgrade continuity.

          Applied patches:

          1. Sort for playlist videos
             https://github.com/futo-org/grayjay-android/pull/2637.patch

          2. Hide comments, ratings and chat
             https://github.com/futo-org/grayjay-android/pull/3252.patch

          3. Disable infinite scroll
             https://github.com/user-attachments/files/26777816/finite-scroll.patch
          EOF
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: grayjay-debug-apk-${{ needs.check-upstream.outputs.release_tag }}
          path: dist/*.apk
          if-no-files-found: error
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-upstream.outputs.release_tag }}
          name: Grayjay ${{ needs.check-upstream.outputs.release_tag }}
          body_path: RELEASE_NOTES.md
          files: dist/*.apk
          draft: false
          prerelease: true
      - name: Update stored upstream SHA
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github
          printf '%s\n' "${{ needs.check-upstream.outputs.upstream_sha }}" > .github/grayjay-last-built-sha.txt
      - name: Commit updated upstream SHA
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/grayjay-last-built-sha.txt
          git diff --cached --quiet && exit 0
          git commit -m "Update Grayjay upstream SHA to ${{ needs.check-upstream.outputs.upstream_sha }}"
          git push
